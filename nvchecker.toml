["filen-desktop"]
source = "github"
github = "FilenCloudDienste/filen-desktop"
use_latest_release = true

["glfw-wayland"]
# Tracks upstream GLFW releases (the cursorfix patch is applied from BoyOrigin/glfw-wayland)
source = "github"
github = "glfw/glfw"
use_latest_release = true

["handbrake"]
source = "github"
github = "HandBrake/HandBrake"
use_latest_release = true

["heroic-games-launcher"]
source = "github"
github = "Heroic-Games-Launcher/HeroicGamesLauncher"
