["ryujinx"]
# Tracks Ryujinx via its Gitea instance API
source = "regex"
url = "https://git.ryujinx.app/api/v1/repos/ryubing/ryujinx/releases?limit=1"
regex = '"tag_name":\s*"([\d.]+)"'

["smartdns-rs"]
source = "github"
github = "mokeyish/smartdns-rs"
use_latest_release = true
prefix = "v"


["umu-launcher"]
source = "github"
github = "Open-Wine-Components/umu-launcher"
use_latest_release = true

["universal-android-debloater"]
source = "github"
github = "Universal-Debloater-Alliance/universal-android-debloater-next-generation"
use_latest_release = true
prefix = "v"


["zlib-ng/zlib-ng"]
source = "github"
github = "zlib-ng/zlib-ng"
use_latest_release = true

["zlib-ng/lib32-zlib-ng"]
# Tracks the 2.x stable/compat branch; the 3.x development track is in zlib-ng/zlib-ng
# include_regex is matched with re.fullmatch, so "^2\." (2 chars) matched no
# tags at all; it needs a trailing ".*" to match the full "2.x.y" tag string.
source = "github"
github = "zlib-ng/zlib-ng"
use_max_tag = true
include_regex = "^2\\..*"

