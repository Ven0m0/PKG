# ════════════════════════════════════════════════════════════════
# OpenJDK
# ════════════════════════════════════════════════════════════════

["java"]
# JDK 24 update repository; tags use format jdk-24.X.Y+Z (strip "jdk-" prefix)
source = "github"
github = "openjdk/jdk24u"
use_max_tag = true
prefix = "jdk-"

["java/java-openjdk"]
# JDK 25 (current EA/GA); tags use format jdk-25.X.Y+Z
source = "github"
github = "openjdk/jdk25u"
use_max_tag = true
prefix = "jdk-"

["java/java21-openjdk"]
# JDK 21 LTS update repository; tags use format jdk-21.X.Y+Z
source = "github"
github = "openjdk/jdk21u"
use_max_tag = true
prefix = "jdk-"

# ════════════════════════════════════════════════════════════════
# Git-based / max-tag packages
# ════════════════════════════════════════════════════════════════

["dolphin-emu"]
# git package tracking xiota/dolphin-primehack; pkgver() derives from git describe
source = "github"
github = "xiota/dolphin-primehack"
use_max_tag = true

["endeavouros-keyring"]
# The keyring repo has no tags; read pkgver from the upstream PKGBUILD instead.
source = "regex"
url = "https://raw.githubusercontent.com/endeavouros-team/PKGBUILDS/master/endeavouros-keyring/PKGBUILD"
regex = "pkgver=[\"']?([\\d.]+)"

["ffmpeg"]
# FFmpeg tags use "n" prefix (e.g. n8.1 → 8.1)
source = "github"
github = "FFmpeg/FFmpeg"
use_max_tag = true
prefix = "n"

["ghostty"]
# git package tracking ghostty-org/ghostty HEAD; use_max_tag gives the latest stable tag
source = "github"
github = "ghostty-org/ghostty"
use_max_tag = true

["glibc"]
# git package tracking sourceware glibc via the bminor/glibc GitHub mirror
source = "github"
github = "bminor/glibc"
use_max_tag = true
prefix = "glibc-"

["mesa-git"]
# git package tracking Mesa HEAD; Mesa lives on gitlab.freedesktop.org
# (github.com/mesa3d/mesa is a dead 404), so track the max mesa-* tag there.
source = "gitlab"
gitlab = "mesa/mesa"
host = "gitlab.freedesktop.org"
use_max_tag = true
prefix = "mesa-"

["rclone-filen"]
# git package tracking FilenCloudDienste/filen-rclone
source = "github"
github = "FilenCloudDienste/filen-rclone"
use_max_tag = true

["svt-av1"]
# git package tracking nekotrix/SVT-AV1-Essential
source = "github"
github = "nekotrix/SVT-AV1-Essential"
use_max_tag = true

["update-alternatives"]
# The upstream repo has no tags at all, so the git source's default
# `git ls-remote --tags --refs` returns nothing and nvchecker errors with
# "command exited without output". use_commit tracks the branch HEAD commit
# instead, which is what the -git pkgver() actually needs to compare against.
source = "git"
git = "https://github.com/fthomys/update-alternatives.git"
branch = "master"
use_commit = true

["wine-tkg-git"]
# wine-tkg builds from wine source; track wine/wine releases as an update trigger
source = "github"
github = "wine-mirror/wine"
use_max_tag = true
prefix = "wine-"

# ════════════════════════════════════════════════════════════════
# npm
# ════════════════════════════════════════════════════════════════

["gemini-cli"]
source = "npm"
npm = "@google/gemini-cli"

# ════════════════════════════════════════════════════════════════
# Regex / HTTP sources
# ════════════════════════════════════════════════════════════════

["endeavouros-mirrorlist"]
# Reads pkgver from EndeavourOS team's own PKGBUILD for the mirrorlist
source = "regex"
url = "https://raw.githubusercontent.com/endeavouros-team/PKGBUILDS/master/endeavouros-mirrorlist/PKGBUILD"
regex = 'pkgver=([\d.]+)'

["firefox"]
# Official Mozilla release metadata endpoint
source = "regex"
url = "https://product-details.mozilla.org/1.0/firefox_versions.json"
regex = '"LATEST_FIREFOX_VERSION":\s*"([\d.]+)"'

# ════════════════════════════════════════════════════════════════
# Repology (Debian / distro-tracked packages)
# ════════════════════════════════════════════════════════════════

["localepurge"]
source = "repology"
repology = "localepurge"
repo = "debian_unstable"

# ════════════════════════════════════════════════════════════════
# Packages with no trackable upstream (version set manually)
# ════════════════════════════════════════════════════════════════

# firefox-sync  – local shell script; pkgver is a manually set date (YYYYMMDD)
# intel-ucode-min – local pacman hook script; pkgver (1.0.1) is the script's own
#                   internal revision, not the Intel microcode release version
