# nvchecker configuration file
# https://github.com/lilydjwg/nvchecker
#
# Package naming convention: ["aur/package-name"] maps to aur/package-name/ directory
# The prefix in the key (e.g., "aur/") should match your repository structure.

[__config__]
oldver = ".github/nvchecker/old_ver.json"
newver = ".github/nvchecker/new_ver.json"

["proton-cachyos-slr"]
source = "regex"
# The GitHub API returns the newest releases first; checking the first 100 is
# enough for the current release history and keeps the lookup non-interactive.
url = "https://api.github.com/repos/CachyOS/proton-cachyos/releases?per_page=100"
regex = '"tag_name":\s*"cachyos-([\d.]+-\d{8})-slr"'

["wine-cachyos"]
source = "regex"
# The GitHub tags API is ordered newest-first; the experimental tag format is
# experimental-wine-bleeding-edge-<version>-<date>-<hashes>.  Capture the full
# suffix after the prefix so _srctag can reconstruct the exact tag.
url = "https://api.github.com/repos/CachyOS/wine-cachyos/tags?per_page=100"
regex = '"name":\s*"experimental-wine-bleeding-edge-([^"]+)"'

["llvm"]
source = "github"
github = "llvm/llvm-project"
use_latest_release = true
prefix = "llvmorg-"

# The nvchecker key follows the chromium/ package directory name in this repo
# to stay aligned with the package directory structure, even though the
# packaged browser is Cromite and its upstream release metadata lives in
# uazo/cromite.
["chromium"]
source = "github"
github = "uazo/cromite"
use_latest_release = true
prefix = "v"

# ════════════════════════════════════════════════════════════════
# GitHub Releases
# ════════════════════════════════════════════════════════════════

["aria2"]
source = "github"
github = "aria2/aria2"
use_latest_release = true

["borked3DS"]
source = "github"
github = "Borked3DS/Borked3DS"
use_latest_release = true

["code"]
source = "github"
github = "microsoft/vscode"
use_latest_release = true
prefix = "v"

["dxvk/dxvk-gplasync"]
# Tracks the gplasync-lowlatency variant (default when _variant=gplasync).
# Upstream release tags look like DXVK-GPLALL-2.7.1-4; strip the prefix so the
# tracked value is the bare 2.7.1-4 that the PKGBUILD's _pkgver consumes.
# use_max_tag instead of use_latest_release because the upstream publishes
# maintenance releases on the 2.6.x branch after newer 2.7.x releases, which
# causes use_latest_release to pick an older version by number.
# `prefix` only strips the winning tag after selection, it does NOT filter
# candidates before the max-tag comparison, so unrelated tags in the repo
# (different naming/series) could outrank the real latest release and
# nvchecker would report a downgrade. include_regex restricts the candidate
# tags to this release line before the max is picked.
source = "github"
github = "Digger1955/dxvk-gplasync-lowlatency"
use_max_tag = true
include_regex = "^DXVK-GPLALL-.*"
prefix = "DXVK-GPLALL-"

["egl-wayland2"]
source = "github"
github = "NVIDIA/egl-wayland2"
use_latest_release = true

["etchdns"]
source = "github"
github = "jedisct1/etchdns"
