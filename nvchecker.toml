github = "miguel-b-p/preload-ng"
use_latest_release = true

["prismlauncher"]
# Tracks official PrismLauncher releases; Diegiwg/PrismLauncher-Cracked follows upstream
source = "github"
github = "PrismLauncher/PrismLauncher"
use_latest_release = true

["qpdf"]
source = "github"
