# Reusable / manually-triggered agent dispatcher.
#
# Secrets expected (this repo or org):
#   ANTHROPIC_API_KEY, GEMINI_API_KEY,
#   OPENCODE_API_KEY, OPENROUTER_API_KEY, KILO_API_KEY, KILO_ORG_ID

name: Run Agent

on:
  workflow_call:
    inputs:
      provider:
        description: "Agent provider: claude | gemini | opencode | kilo"
        required: true
        type: string
      prompt:
        description: "Prompt to send"
        required: true
        type: string
      model:
        description: "Model override (blank = provider default)"
        required: false
        type: string
        default: ""
      fallback_model:
        description: "OpenCode fallback model, tried only if the primary opencode run fails (blank = no fallback)"
        required: false
        type: string
        default: ""
    secrets:
      ANTHROPIC_API_KEY:
        required: false
      GEMINI_API_KEY:
        required: false
      OPENCODE_API_KEY:
        required: false
      OPENROUTER_API_KEY:
        required: false
      KILO_API_KEY:
        required: false
      KILO_ORG_ID:
        required: false

  # checkov:skip=CKV_GHA_7: Manual inputs required
  workflow_dispatch:
    inputs:
      provider:
        description: "Agent provider"
        required: true
        type: choice
        options: [claude, gemini, opencode, kilo]
        default: claude
      prompt:
        description: "Prompt to send"
        required: true
        type: string
      model:
        description: "Model override (leave blank for provider default)"
        required: false
        type: string
        default: ""
      fallback_model:
        description: "OpenCode fallback model, tried only if the primary opencode run fails (blank = no fallback)"
        required: false
        type: string
        default: ""

permissions:
  id-token: write
  contents: write
  pull-requests: write
  issues: write

jobs:
  run-agent:
    runs-on: ubuntu-latest
    # Package update tasks may need extra time for non-interactive checksum and
    # metadata refreshes on heavyweight packages such as LLVM or Chromium.
    timeout-minutes: 90
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      KILO_API_KEY: ${{ secrets.KILO_API_KEY }}
      KILO_ORG_ID: ${{ secrets.KILO_ORG_ID }}
      GIT_AUTHOR_NAME: Ven0m0
      GIT_AUTHOR_EMAIL: Ven0m0@users.noreply.github.com
      GIT_COMMITTER_NAME: Ven0m0
      GIT_COMMITTER_EMAIL: Ven0m0@users.noreply.github.com
      CI: "true"
      GH_PROMPT_DISABLED: "1"
      GIT_TERMINAL_PROMPT: "0"
      DEBIAN_FRONTEND: noninteractive

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 2
      - name: Configure git identity
        shell: bash
        run: |
          git config --local user.email "${GIT_AUTHOR_EMAIL}"
          git config --local user.name "${GIT_AUTHOR_NAME}"

      - name: Run Claude
        if: inputs.provider == 'claude'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: ${{ inputs.prompt }}
          claude_args: ${{ inputs.model != '' && format('--model {0}', inputs.model) || '' }}
        env:
          CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS: "1"
          CLAUDE_CODE_ENABLE_TELEMETRY: "0"
          CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"
          DISABLE_NON_ESSENTIAL_MODEL_CALLS: "1"
          CLAUDE_CODE_ATTRIBUTION_HEADER: "0"
          ENABLE_TOOL_SEARCH: "1"
          ENABLE_LSP_TOOL: "1"
          USE_BUILTIN_RIPGREP: "1"
          CLAUDE_CODE_ENABLE_TASKS: "true"

      - name: Run Gemini
        if: inputs.provider == 'gemini'
        uses: google-github-actions/run-gemini-cli@f5a57753971eb5f2734c70df7e796f2fcfbef6e7
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          gemini_model: ${{ inputs.model }}
          prompt: ${{ inputs.prompt }}

      - name: Run OpenCode
        id: opencode
        if: inputs.provider == 'opencode'
        # Must be a literal: expressions here are re-evaluated inside the
        # composite action, where workflow inputs are empty, so
        # `inputs.fallback_model != ''` silently becomes false
        # (actions/runner#2418). The gate step below restores job failure
        # when neither attempt succeeds.
        continue-on-error: true
        uses: anomalyco/opencode/github@github-v1.2.25
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          KILO_API_KEY: ${{ secrets.KILO_API_KEY }}
          KILO_ORG_ID: ${{ secrets.KILO_ORG_ID }}
          GITHUB_TOKEN: ${{ github.token }}
          GH_TOKEN: ${{ github.token }}
          OPENCODE_EXPERIMENTAL: "true"
          OPENCODE_ENABLE_EXA: "1"
          OPENCODE_EXPERIMENTAL_LSP_TOOL: "true"
          OPENCODE_EXPERIMENTAL_MARKDOWN: "true"
          OPENCODE_ENABLE_EXPERIMENTAL_MODELS: "true"
          OPENCODE_EXPERIMENTAL_BASH_DEFAULT_TIMEOUT_MS: "300000"
          OPENCODE_EXPERIMENTAL_LAZY_TOOLS: "true"
          OPENCODE_PRUNE_SCALE_WITH_CONTEXT: "true"
          OPENCODE_DISABLE_FILETIME_CHECK: "true"
          OPENCODE_DISABLE_CLAUDE_CODE_PROMPT: "1"
          OPENCODE_DISABLE_AUTOUPDATE: "true"
          OPENCODE_EXPERIMENTAL_OXFMT: "true"
          MORPH_TIMEOUT: "60000"
          MORPH_MODEL: morph-v3-fast
        with:
          model: ${{ inputs.model != '' && inputs.model || 'opencode/nemotron-3-ultra-free' }}
          prompt: ${{ inputs.prompt }}
          use_github_token: false

      - name: Run OpenCode (fallback model)
        id: opencode-fallback
        if: inputs.provider == 'opencode' && inputs.fallback_model != '' && steps.opencode.outcome == 'failure'
        uses: anomalyco/opencode/github@github-v1.2.25
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          KILO_API_KEY: ${{ secrets.KILO_API_KEY }}
          KILO_ORG_ID: ${{ secrets.KILO_ORG_ID }}
          GITHUB_TOKEN: ${{ github.token }}
          GH_TOKEN: ${{ github.token }}
          OPENCODE_EXPERIMENTAL: "true"
          OPENCODE_ENABLE_EXA: "1"
          OPENCODE_EXPERIMENTAL_LSP_TOOL: "true"
          OPENCODE_EXPERIMENTAL_MARKDOWN: "true"
          OPENCODE_ENABLE_EXPERIMENTAL_MODELS: "true"
          OPENCODE_EXPERIMENTAL_BASH_DEFAULT_TIMEOUT_MS: "300000"
          OPENCODE_EXPERIMENTAL_LAZY_TOOLS: "true"
          OPENCODE_PRUNE_SCALE_WITH_CONTEXT: "true"
          OPENCODE_DISABLE_FILETIME_CHECK: "true"
          OPENCODE_DISABLE_CLAUDE_CODE_PROMPT: "1"
          OPENCODE_DISABLE_AUTOUPDATE: "true"
          OPENCODE_EXPERIMENTAL_OXFMT: "true"
          MORPH_TIMEOUT: "60000"
          MORPH_MODEL: morph-v3-fast
        with:
          model: ${{ inputs.fallback_model }}
          prompt: ${{ inputs.prompt }}
          use_github_token: false

      # Restores the failure swallowed by continue-on-error on the primary
      # OpenCode step when no fallback ran or the fallback was skipped.
      - name: Fail if no OpenCode attempt succeeded
        if: inputs.provider == 'opencode' && steps.opencode.outcome != 'success' && steps.opencode-fallback.outcome != 'success'
        shell: bash
        run: |
          set -euo pipefail
          echo "::error::OpenCode failed (primary: ${{ steps.opencode.outcome }}, fallback: ${{ steps.opencode-fallback.outcome }})"
          exit 1

      - name: Get Kilo version
        if: inputs.provider == 'kilo'
        id: kilo-version
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          VERSION="$(
            curl -fsSL \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/repos/Kilo-Org/kilocode/releases/latest |
            jq -er '.tag_name'
          )"
          [[ -n "${VERSION}" ]] || { echo "Failed to fetch Kilo version" >&2; exit 1; }
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
      - name: Cache Kilo
        if: inputs.provider == 'kilo'
        id: kilo-cache
        uses: actions/cache@v6
        with:
          path: ~/.kilo/bin
          key: kilo-${{ runner.os }}-${{ runner.arch }}-${{ steps.kilo-version.outputs.version }}
          restore-keys: |
            kilo-${{ runner.os }}-${{ runner.arch }}-
      - name: Install Kilo CLI
        if: inputs.provider == 'kilo' && steps.kilo-cache.outputs.cache-hit != 'true'
        shell: bash
        run: curl -fsSL https://kilo.ai/cli/install | bash
      - name: Add Kilo to PATH
        if: inputs.provider == 'kilo'
        shell: bash
        run: echo "$HOME/.kilo/bin" >> "$GITHUB_PATH"
      - name: Run Kilo
        if: inputs.provider == 'kilo'
        shell: bash
        run: kilo github run
        env:
          MODEL: ${{ inputs.model != '' && inputs.model || 'kilo/kilo-auto/frontier' }}
          PROMPT: ${{ inputs.prompt }}
          USE_GITHUB_TOKEN: "true"
          KILO_API_KEY: ${{ secrets.KILO_API_KEY }}
          KILO_ORG_ID: ${{ secrets.KILO_ORG_ID }}
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ github.token }}
          OPENCODE_EXPERIMENTAL: "true"
          OPENCODE_EXPERIMENTAL_MARKDOWN: "true"
          OPENCODE_ENABLE_EXPERIMENTAL_MODELS: "true"
          OPENCODE_EXPERIMENTAL_BASH_DEFAULT_TIMEOUT_MS: "300000"
          OPENCODE_EXPERIMENTAL_LAZY_TOOLS: "true"
          OPENCODE_PRUNE_SCALE_WITH_CONTEXT: "true"
          OPENCODE_DISABLE_FILETIME_CHECK: "true"
          OPENCODE_DISABLE_CLAUDE_CODE_PROMPT: "true"
          OPENCODE_DISABLE_AUTOUPDATE: "true"
          OPENCODE_EXPERIMENTAL_OXFMT: "true"
          MORPH_TIMEOUT: "60000"
          MORPH_MODEL: morph-v3-fast
