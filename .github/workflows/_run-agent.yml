# Template: Call run-agent-prompt from an external repo
#
# Setup: add secrets to this repo (Settings > Secrets and variables > Actions):
#   ANTHROPIC_API_KEY   - for claude / opencode
#   GEMINI_API_KEY      - for gemini
#   JULES_API_KEY       - for jules
#   OPENCODE_API_KEY    - for opencode
#   OPENROUTER_API_KEY  - for opencode / kilo (model routing)
#   KILO_API_KEY        - for kilo
#   KILO_ORG_ID         - for kilo
#
# GITHUB_TOKEN is provided automatically by Actions — no secret needed.
#
# Keys are injected as env vars on the job; the action falls back to them
# automatically. You can omit any key not needed by your chosen provider.

name: Run Agent

on:
  # Manual trigger with provider/prompt/model selection
  workflow_dispatch:
    inputs:
      provider:
        description: "Agent provider"
        required: true
        type: choice
        options: [claude, gemini, jules, opencode, kilo]
        default: claude
      prompt:
        description: "Prompt to send"
        required: true
        type: string
      model:
        description: "Model override (leave blank for provider default)"
        required: false
        type: string
        default: ""

  # Example: run on every PR comment containing /agent <prompt>
  # issue_comment:
  #   types: [created]

  # Example: run on a schedule
  # schedule:
  #   - cron: "0 6 * * 1"  # every Monday 06:00 UTC

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  run-agent:
    runs-on: ubuntu-latest

    # All secrets injected as env vars — action picks them up automatically.
    # Add or remove lines to match the providers you actually use.
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
      OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      KILO_API_KEY: ${{ secrets.KILO_API_KEY }}
      KILO_ORG_ID: ${{ secrets.KILO_ORG_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run agent
        uses: YOUR_ORG/YOUR_ACTIONS_REPO/actions/run-agent-prompt@main
        with:
          provider: ${{ inputs.provider }}
          prompt: ${{ inputs.prompt }}
          model: ${{ inputs.model }}
          # github-token is optional here; action falls back to env.GITHUB_TOKEN
          # which Actions sets automatically. Uncomment if you need an explicit PAT:
          # github-token: ${{ secrets.PAT }}

  # ── Hardcoded provider examples ───────────────────────────────────────────

  run-claude:
    if: false  # remove this line to enable
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: YOUR_ORG/YOUR_ACTIONS_REPO/actions/run-agent-prompt@main
        with:
          provider: claude
          prompt: "Review recent changes and open a PR with improvements"
          # model: "claude-opus-4-5"  # optional override

  run-gemini:
    if: false  # remove this line to enable
    runs-on: ubuntu-latest
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: YOUR_ORG/YOUR_ACTIONS_REPO/actions/run-agent-prompt@main
        with:
          provider: gemini
          prompt: "Audit the codebase for security issues"

  run-jules:
    if: false  # remove this line to enable
    runs-on: ubuntu-latest
    env:
      JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
    steps:
      - uses: actions/checkout@v6
      - uses: YOUR_ORG/YOUR_ACTIONS_REPO/actions/run-agent-prompt@main
        with:
          provider: jules
          prompt: "Fix all failing tests"

  run-opencode:
    if: false  # remove this line to enable
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
    steps:
      - uses: actions/checkout@v6
      - uses: YOUR_ORG/YOUR_ACTIONS_REPO/actions/run-agent-prompt@main
        with:
          provider: opencode
          prompt: "Refactor the auth module"

  run-kilo:
    if: false  # remove this line to enable
    runs-on: ubuntu-latest
    env:
      KILO_API_KEY: ${{ secrets.KILO_API_KEY }}
      KILO_ORG_ID: ${{ secrets.KILO_ORG_ID }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
    steps:
      - uses: actions/checkout@v6
      - uses: YOUR_ORG/YOUR_ACTIONS_REPO/actions/run-agent-prompt@main
        with:
          provider: kilo
          prompt: "Add unit tests for all public functions"
