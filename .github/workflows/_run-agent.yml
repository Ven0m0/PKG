# Reusable / manually-triggered agent dispatcher.
#
# Secrets expected (this repo or org):
#   ANTHROPIC_API_KEY, GEMINI_API_KEY, JULES_API_KEY,
#   OPENCODE_API_KEY, OPENROUTER_API_KEY, KILO_API_KEY, KILO_ORG_ID
#
# Action lives in: Ven0m0/.github/actions/run-agent-prompt

name: Run Agent

on:
  workflow_call:
    inputs:
      provider:
        description: "Agent provider: claude | gemini | jules | opencode | kilo"
        required: true
        type: string
      prompt:
        description: "Prompt to send"
        required: true
        type: string
      model:
        description: "Model override (blank = provider default)"
        required: false
        type: string
        default: ""
    secrets:
      ANTHROPIC_API_KEY:
        required: false
      GEMINI_API_KEY:
        required: false
      JULES_API_KEY:
        required: false
      OPENCODE_API_KEY:
        required: false
      OPENROUTER_API_KEY:
        required: false
      KILO_API_KEY:
        required: false
      KILO_ORG_ID:
        required: false

  workflow_dispatch:
    inputs:
      provider:
        description: "Agent provider"
        required: true
        type: choice
        options: [claude, gemini, jules, opencode, kilo]
        default: claude
      prompt:
        description: "Prompt to send"
        required: true
        type: string
      model:
        description: "Model override (leave blank for provider default)"
        required: false
        type: string
        default: ""

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  run-agent:
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
      OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      KILO_API_KEY: ${{ secrets.KILO_API_KEY }}
      KILO_ORG_ID: ${{ secrets.KILO_ORG_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run agent
        uses: Ven0m0/.github/actions/run-agent-prompt@main
        with:
          provider: ${{ inputs.provider }}
          prompt: ${{ inputs.prompt }}
          model: ${{ inputs.model }}
