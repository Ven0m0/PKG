# Reusable / manually-triggered agent dispatcher.
#
# Secrets expected (this repo or org):
#   ANTHROPIC_API_KEY, GEMINI_API_KEY,
#   OPENCODE_API_KEY, OPENROUTER_API_KEY, KILO_API_KEY, KILO_ORG_ID

name: Run Agent

on:
  workflow_call:
    inputs:
      provider:
        description: "Agent provider: claude | gemini | opencode | kilo"
        required: true
        type: string
      prompt:
        description: "Prompt to send"
        required: true
        type: string
      model:
        description: "Model override (blank = provider default)"
        required: false
        type: string
        default: ""
    secrets:
      ANTHROPIC_API_KEY:
        required: false
      GEMINI_API_KEY:
        required: false
      OPENCODE_API_KEY:
        required: false
      OPENROUTER_API_KEY:
        required: false
      KILO_API_KEY:
        required: false
      KILO_ORG_ID:
        required: false

  workflow_dispatch:
    inputs:
      provider:
        description: "Agent provider"
        required: true
        type: choice
        options: [claude, gemini, opencode, kilo]
        default: claude
      prompt:
        description: "Prompt to send"
        required: true
        type: string
      model:
        description: "Model override (leave blank for provider default)"
        required: false
        type: string
        default: ""

permissions:
  id-token: write
  contents: write
  pull-requests: write
  issues: write

jobs:
  run-agent:
    runs-on: ubuntu-latest
    # Package update tasks may need extra time for non-interactive checksum and
    # metadata refreshes on heavyweight packages such as LLVM or Chromium.
    timeout-minutes: 90
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      KILO_API_KEY: ${{ secrets.KILO_API_KEY }}
      KILO_ORG_ID: ${{ secrets.KILO_ORG_ID }}
      GIT_AUTHOR_NAME: Ven0m0
      GIT_AUTHOR_EMAIL: Ven0m0@users.noreply.github.com
      GIT_COMMITTER_NAME: Ven0m0
      GIT_COMMITTER_EMAIL: Ven0m0@users.noreply.github.com
      CI: "true"
      GH_PROMPT_DISABLED: "1"
      GIT_TERMINAL_PROMPT: "0"
      DEBIAN_FRONTEND: noninteractive

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - name: Configure git identity
        shell: bash
        run: |
          git config --local user.email "${GIT_AUTHOR_EMAIL}"
          git config --local user.name "${GIT_AUTHOR_NAME}"

      - name: Run Claude
        if: inputs.provider == 'claude'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: ${{ inputs.prompt }}
          claude_args: ${{ inputs.model != '' && format('--model {0}', inputs.model) || '' }}
        env:
          CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS: "1"
          CLAUDE_CODE_ENABLE_TELEMETRY: "0"
          CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"
          DISABLE_NON_ESSENTIAL_MODEL_CALLS: "1"
          CLAUDE_CODE_ATTRIBUTION_HEADER: "0"
          ENABLE_TOOL_SEARCH: "1"
          ENABLE_LSP_TOOL: "1"
          USE_BUILTIN_RIPGREP: "1"
          CLAUDE_CODE_ENABLE_TASKS: "true"

      - name: Run Gemini
        if: inputs.provider == 'gemini'
        uses: google-github-actions/run-gemini-cli@f8ccaba862180254d5633c35bf3b7310792eb69f
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          gemini_model: ${{ inputs.model }}
          prompt: ${{ inputs.prompt }}

      - name: Run OpenCode
        if: inputs.provider == 'opencode'
        uses: anomalyco/opencode/github@latest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          KILO_API_KEY: ${{ secrets.KILO_API_KEY }}
          KILO_ORG_ID: ${{ secrets.KILO_ORG_ID }}
          GITHUB_TOKEN: ${{ github.token }}
          GH_TOKEN: ${{ github.token }}
          OPENCODE_EXPERIMENTAL: "true"
          OPENCODE_ENABLE_EXA: "1"
          OPENCODE_EXPERIMENTAL_LSP_TOOL: "true"
          OPENCODE_EXPERIMENTAL_MARKDOWN: "true"
          OPENCODE_ENABLE_EXPERIMENTAL_MODELS: "true"
          OPENCODE_EXPERIMENTAL_BASH_DEFAULT_TIMEOUT_MS: "300000"
          OPENCODE_EXPERIMENTAL_LAZY_TOOLS: "true"
          OPENCODE_PRUNE_SCALE_WITH_CONTEXT: "true"
          OPENCODE_DISABLE_FILETIME_CHECK: "true"
          OPENCODE_DISABLE_CLAUDE_CODE_PROMPT: "1"
          OPENCODE_DISABLE_AUTOUPDATE: "true"
          OPENCODE_EXPERIMENTAL_OXFMT: "true"
          MORPH_TIMEOUT: "60000"
          MORPH_MODEL: morph-v3-fast
        with:
          model: ${{ inputs.model != '' && inputs.model || 'opencode/minimax-m2.5-free' }}
          prompt: ${{ inputs.prompt }}
          use_github_token: true

      - name: Get Kilo version
        if: inputs.provider == 'kilo'
        id: kilo-version
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          VERSION="$(
            curl -fsSL \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/repos/Kilo-Org/kilocode/releases/latest |
              python - <<'PY'
                import json
                import sys

                data = json.load(sys.stdin)
                version = data.get("tag_name")
                if not version:
                    sys.stderr.write("Missing tag_name in Kilo release response\n")
                    sys.exit(1)

                print(version)
              PY
          )"
          [[ -n "${VERSION}" ]] || { echo "Failed to fetch Kilo version" >&2; exit 1; }
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
      - name: Cache Kilo
        if: inputs.provider == 'kilo'
        id: kilo-cache
        uses: actions/cache@v5
        with:
          path: ~/.kilo/bin
          key: kilo-${{ runner.os }}-${{ runner.arch }}-${{ steps.kilo-version.outputs.version }}
          restore-keys: |
            kilo-${{ runner.os }}-${{ runner.arch }}-
      - name: Install Kilo CLI
        if: inputs.provider == 'kilo' && steps.kilo-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          curl -fsSL https://kilo.ai/cli/install | bash
          echo "$HOME/.kilo/bin" >> "$GITHUB_PATH"
      - name: Run Kilo
        if: inputs.provider == 'kilo'
        shell: bash
        run: kilo github run
        env:
          MODEL: ${{ inputs.model != '' && inputs.model || 'kilo/kilo-auto/frontier' }}
          PROMPT: ${{ inputs.prompt }}
          USE_GITHUB_TOKEN: "true"
          KILO_API_KEY: ${{ secrets.KILO_API_KEY }}
          KILO_ORG_ID: ${{ secrets.KILO_ORG_ID }}
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ github.token }}
          OPENCODE_EXPERIMENTAL: "true"
          OPENCODE_EXPERIMENTAL_MARKDOWN: "true"
          OPENCODE_ENABLE_EXPERIMENTAL_MODELS: "true"
          OPENCODE_EXPERIMENTAL_BASH_DEFAULT_TIMEOUT_MS: "300000"
          OPENCODE_EXPERIMENTAL_LAZY_TOOLS: "true"
          OPENCODE_PRUNE_SCALE_WITH_CONTEXT: "true"
          OPENCODE_DISABLE_FILETIME_CHECK: "true"
          OPENCODE_DISABLE_CLAUDE_CODE_PROMPT: "true"
          OPENCODE_DISABLE_AUTOUPDATE: "true"
          OPENCODE_EXPERIMENTAL_OXFMT: "true"
          MORPH_TIMEOUT: "60000"
          MORPH_MODEL: morph-v3-fast
