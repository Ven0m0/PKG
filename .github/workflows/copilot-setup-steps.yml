name: Copilot Setup Steps

on:
  # checkov:skip=CKV_GHA_7: Manual inputs required
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

permissions:
  contents: read

env:
  DEBIAN_FRONTEND: noninteractive
  DEBCONF_NOWARNINGS: yes
  UV_PYTHON_PREFERENCE: only-managed

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Install system packages
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          # Ubuntu package names: `golang-go` provides `go`; `pacman` and `namcap` are used only for PKGBUILD syntax validation and metadata inspection in this Ubuntu bootstrap environment.
          packages: fd-find golang-go jq parallel ripgrep shellcheck wget
          version: 1.0

      - name: Expose fd on Ubuntu
        shell: bash
        run: |
          set -euo pipefail
          if command -v fdfind >/dev/null 2>&1; then
            sudo ln -sf "$(command -v fdfind)" /usr/local/bin/fd
          fi

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.14"
          enable-cache: false
          cache-python: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Enable Corepack
        shell: bash
        run: corepack enable

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install repository toolchain
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true
          experimental: true

      - name: Install repo linters and helpers
        shell: bash
        run: |
          set -euo pipefail
          # This repo does not pin standalone lint CLI versions yet, so bootstrap the latest tools here until a shared version manifest exists.
          uv tool install ruff
          bun add --global @biomejs/biome
          go install github.com/google/yamlfmt/cmd/yamlfmt@latest
          sudo install -m 0755 "$HOME/go/bin/yamlfmt" /usr/local/bin/yamlfmt

          shfmt_version="3.10.0"
          wget -q "https://github.com/mvdan/sh/releases/download/v${shfmt_version}/shfmt_v${shfmt_version}_linux_amd64" -O shfmt
          sudo install -m 0755 shfmt /usr/local/bin/shfmt
          rm -f shfmt

          shellharden_version="4.3.1"
          wget -q "https://github.com/anordal/shellharden/releases/download/v${shellharden_version}/shellharden-x86_64-unknown-linux-gnu.tar.gz" -O shellharden.tar.gz
          tar -xzf shellharden.tar.gz shellharden
          sudo install -m 0755 shellharden /usr/local/bin/shellharden
          rm -f shellharden shellharden.tar.gz
