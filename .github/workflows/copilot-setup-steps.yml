name: Copilot Setup Steps

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

permissions:
  contents: read

env:
  DEBIAN_FRONTEND: noninteractive
  DEBCONF_NOWARNINGS: "yes"

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Install system packages
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: fd-find golang-go jq namcap pacman parallel ripgrep shellcheck wget
          version: 1.0

      - name: Expose fd on Ubuntu
        shell: bash
        run: |
          set -euo pipefail
          if command -v fdfind >/dev/null 2>&1; then
            sudo ln -sf "$(command -v fdfind)" /usr/local/bin/fd
          fi

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Enable Corepack
        shell: bash
        run: corepack enable

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install repository toolchain
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true
          experimental: true

      - name: Install repo linters and helpers
        shell: bash
        run: |
          set -euo pipefail
          uv tool install ruff
          bun add --global @biomejs/biome
          go install github.com/google/yamlfmt/cmd/yamlfmt@latest
          sudo install -m 0755 "$HOME/go/bin/yamlfmt" /usr/local/bin/yamlfmt

          shfmt_version="3.10.0"
          wget -q "https://github.com/mvdan/sh/releases/download/v${shfmt_version}/shfmt_v${shfmt_version}_linux_amd64" -O shfmt
          sudo install -m 0755 shfmt /usr/local/bin/shfmt
          rm -f shfmt

          shellharden_version="4.3.1"
          wget -q "https://github.com/anordal/shellharden/releases/download/v${shellharden_version}/shellharden-x86_64-unknown-linux-gnu.tar.gz" -O shellharden.tar.gz
          tar -xzf shellharden.tar.gz shellharden
          sudo install -m 0755 shellharden /usr/local/bin/shellharden
          rm -f shellharden shellharden.tar.gz
