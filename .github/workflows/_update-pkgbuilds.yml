name: _update-pkgbuilds
on:
  workflow_dispatch:
    inputs:
      packages:
        description: "Space-separated package dirs to update (blank = all)"
        required: false
        type: string
        default: ""
jobs:
  update-pkgbuilds:
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    uses: ./.github/workflows/_run-agent.yml
    with:
      provider: opencode
      model: "opencode/kimi-k2.5"
      prompt: |
        Arch PKG repo expert. Task: update all PKGBUILDsâ†’latest upstream; open 1 PR. ${inputs.packages!=''?'Only dirs: '+inputs.packages:'All pkgs.'} Steps: 1.Discover: fd -t f -g 'PKGBUILD' --exclude '.git'. 2.For each: sourceâ†’pkgname,pkgver,pkgrel,url,source[]. Detect upstream via: GH releasesâ†’/releases/latest.tag_name; GH tagsâ†’/tags[0].name; PyPIâ†’.info.version; npmâ†’.version; AURâ†’.results[0].Version; cratesâ†’.crate.max_stable_version; else parse URL. strip 'v'. 3.If upstreamâ‰ pkgver: set pkgver,new; pkgrel=1; cd dir; updpkgsums; makepkg --printsrcinfo>.SRCINFO; mark updated. else skip. 4.Errors: updpkgsums failâ†’skip; no upstreamâ†’skip. 5.Commit: git config bot; git add -A; git commit -m "chore: update PKGBUILDs: Updated {pkg}:{old}->{new}; Skipped {pkg}:{reason}". 6.PR: branch update/pkgbuilds-$(date +%Y%m%d); title "chore: update PKGBUILDs â€” $(date +%Y-%m-%d)"; body table pkg|old|new + skipped; base main; labels automated,update; gh pr create; if none updatedâ†’no PR.
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      KILO_API_KEY: ${{ secrets.KILO_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
