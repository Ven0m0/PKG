name: _update-pkgbuilds
on:
  workflow_dispatch:
    inputs:
      packages:
        description: "Space-separated version-controlled package dirs to update (blank = all tracked packages)"
        required: false
        type: string
        default: ""
jobs:
  update-pkgbuilds:
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    uses: ./.github/workflows/_run-agent.yml
    with:
      provider: opencode
      model: "kilo/x-ai/grok-code-fast-1:optimized:free"
      prompt: |
        Update version-controlled PKGBUILDs and open one pull request.
        ${{ inputs.packages != '' && format('Only process these package directories: {0}', inputs.packages) || 'If no packages are provided, process every package listed in nvchecker.toml.' }}
        Requirements:
        1. Discover package directories with `git ls-files ':(glob)**/PKGBUILD'`; if that is unavailable, fall back to `rg --files -g 'PKGBUILD'`. Limit work to the requested directories or the package keys in `nvchecker.toml`.
        2. Read `nvchecker.toml` and `.github/nvchecker/old_ver.json` first. Keep both files version controlled and update `.github/nvchecker/old_ver.json` for every package you change.
        3. Run fully non-interactively. Never wait for input. Use explicit flags for git, gh, and makepkg commands.
        4. Before making any changes, create a branch named `update/pkgbuilds-$(date +%Y%m%d-%H%M%S)`.
        5. For normal PKGBUILDs, update `pkgver`, reset `pkgrel=1`, run `updpkgsums`, then `makepkg --printsrcinfo > .SRCINFO`.
        6. For `proton-cachyos-slr` and `wine-cachyos`, update `_srctag` and keep the derived `pkgver` expression unchanged.
        7. For `llvm`, treat the nvchecker result as the tracked upstream release version for `.github/nvchecker/old_ver.json`; if the PKGBUILD derives `pkgver` via `pkgver()`, refresh it with non-interactive makepkg tooling instead of editing the generated value by hand.
        8. For `chromium`, parse the tracked Cromite release as `{pkgver}-{commit}`.
        9. For `chromium`, update both `pkgver` and `_commit`, and if `_pkgver` is missing insert the unevaluated PKGBUILD assignment `_pkgver=${pkgver}` immediately after the `pkgver=` line so the source URLs keep following the current `pkgver` variable.
        10. For `chromium`, refresh sums and `.SRCINFO` after the metadata update.
        11. If `updpkgsums` or `makepkg --printsrcinfo` fails, skip that package and record the reason.
        12. Commit only the changed tracked files with a concise summary of updated and skipped packages, push the branch, and create one PR against `main`. If nothing changed, exit without creating a PR.
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      KILO_API_KEY: ${{ secrets.KILO_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
